<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THR Spesial buat Kamu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0b0b0b, #2a2a2a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 900px;
            width: 100%;
            background: rgba(30, 30, 30, 0.95);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 2px solid #ffd700;
        }

        h2 {
            font-size: 2.2rem;
            color: #ffd700;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .video-container {
            background: #000;
            border-radius: 30px;
            overflow: hidden;
            margin: 30px 0;
            border: 3px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        video {
            width: 100%;
            display: block;
        }

        .instruction {
            color: #aaa;
            margin-top: 20px;
            font-size: 1rem;
        }

        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px dashed #ffd700;
            padding-top: 20px;
        }

        .footer span {
            color: #ffd700;
            font-weight: bold;
        }

        /* JUMPScare effect */
        .jumpscare-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: red;
            z-index: 9999;
            animation: flash 0.1s infinite;
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .jumpscare-image {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 100%;
            max-height: 100%;
            z-index: 10000;
        }
    </style>
</head>
<body>
    <div class="card" id="mainCard">
        <h2>🎁 Sebelum di kasih THR dengarkan mas ambah berbicara!</h2>
        
        <div class="video-container">
            <!-- GANTI 'video_lo.mp4' dengan file video lo -->
            <video id="myVideo" controls>
                <source src="video_lo.mp4" type="video/mp4">
                Browser lo gak support video.
            </video>
        </div>

        <p class="instruction">⏳ Video akan habis dengan sendirinya...</p>

        <div class="footer">
            © <span>VoidTeam</span> • 2026
        </div>
    </div>

    <script>
        // URL JUMPScare (ganti pake link YouTube yang bikin kaget)
        const JUMPSCARE_URL = 'https://youtube.com/shorts/VzVwyhz57ig?si=uT8atCObWEl6qayz'; // GANTI INI!

        const video = document.getElementById('myVideo');
        let videoPlayed = false;

        // Fungsi jumpscare
        function triggerJumpscare() {
            // Efek visual kaget
            document.body.innerHTML = `
                <div class="jumpscare-effect"></div>
                <img src="https://media.tenor.com/x8v1oNUOmg4AAAAd/rick-roll-rick-ashley.gif" class="jumpscare-image">
                <audio autoplay>
                    <source src="https://www.myinstants.com/media/sounds/rick-roll.mp3" type="audio/mpeg">
                </audio>
            `;
            
            document.body.style.background = 'red';
            
            // Geter dikit
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    window.scrollBy(10 * (i % 2 === 0 ? 1 : -1), 10 * (i % 2 === 0 ? 1 : -1));
                }, i * 50);
            }

            // Redirect ke YouTube setelah 1 detik
            setTimeout(() => {
                window.location.href = JUMPSCARE_URL;
            }, 1000);
        }

        // Pas video mulai diputar
        video.addEventListener('play', function() {
            videoPlayed = true;
        });

        // Pas video abis → JUMPScare!
        video.addEventListener('ended', function() {
            triggerJumpscare();
        });

        // Jebakan: kalo user pause sebelum abis
        video.addEventListener('pause', function() {
            if (videoPlayed && video.currentTime < video.duration - 1) {
                triggerJumpscare();
            }
        });

        // Gak bisa balik ke halaman sebelumnya
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    </script>
</body>
</html>
