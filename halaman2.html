<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎁 Pesan Dari Pak Amba</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(145deg, #1a1e2b, #252b3d);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 60px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.7);
        }

        h2 {
            font-size: 2.8rem;
            color: #ffd700;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
            line-height: 1.3;
        }

        .message-from {
            font-size: 1.3rem;
            color: #aaa;
            margin-bottom: 20px;
            font-style: italic;
        }

        .video-wrapper {
            background: #000;
            border-radius: 40px;
            overflow: hidden;
            margin: 30px 0;
            border: 4px solid #ffd700;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.4);
        }

        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }

        .info-text {
            color: #ddd;
            margin: 25px 0 15px;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 20px;
            border-radius: 50px;
            display: inline-block;
        }

        .footer {
            margin-top: 40px;
            color: #888;
            font-size: 1rem;
            border-top: 2px solid rgba(255, 215, 0, 0.3);
            padding-top: 25px;
        }

        .footer span {
            color: #ffd700;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .card { padding: 30px 20px; }
            h2 { font-size: 2rem; }
            .message-from { font-size: 1.1rem; }
            .info-text { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎁 Pesan Dari Pak Amba</h2>
        <div class="message-from">dengarkan dulu baru dapat THR</div>
        
        <div class="video-wrapper">
            <!-- 🔴 GANTI DENGAN NAMA FILE VIDEO LO -->
            <video id="myVideo" controls>
                <source src="video_lo.mp4" type="video/mp4">
                Browser tidak support video.
            </video>
        </div>

        <div class="info-text">
            ⏳ <span id="timer">0:00 / 0:15</span> ⏳
        </div>

        <div class="footer">
            © <span>VoidTeam</span> • 1446 H
        </div>
    </div>

    <script>
        // ========== KONFIGURASI ==========
        // 🔴 GANTI LINK YOUTUBE TUJUAN DI SINI
        const TARGET_URL = 'https://youtube.com/shorts/VzVwyhz57ig?si=uT8atCObWEl6qayz'; // Ganti dengan URL tujuan

        const video = document.getElementById('myVideo');
        let videoPlayed = false;

        // ========== UPDATE TIMER ==========
        const timerEl = document.getElementById('timer');
        
        video.addEventListener('timeupdate', function() {
            const current = formatTime(video.currentTime);
            const duration = formatTime(video.duration || 15);
            timerEl.textContent = `${current} / ${duration}`;
        });

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // ========== FUNGSI REDIRECT ==========
        function triggerRedirect() {
            // Efek geter
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    window.scrollBy(15 * (i % 2 === 0 ? 1 : -1), 15 * (i % 2 === 0 ? 1 : -1));
                }, i * 70);
            }

            // Redirect
            setTimeout(() => {
                window.location.href = TARGET_URL;
            }, 300);
        }

        // ========== EVENT VIDEO ==========
        video.addEventListener('play', function() {
            videoPlayed = true;
        });

        video.addEventListener('ended', function() {
            triggerRedirect();
        });

        video.addEventListener('pause', function() {
            if (videoPlayed && video.currentTime < video.duration - 1) {
                triggerRedirect();
            }
        });

        // ========== LOCK BACK BUTTON ==========
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    </script>
</body>
</html>
