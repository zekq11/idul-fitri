<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎁 Pesan Dari Pak Amba</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1e2b, #252b3d);
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .card {
            max-width: 1100px;  /* Lebih lebar */
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 60px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.7);
        }

        h2 {
            font-size: 2.8rem;
            color: #ffd700;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
            line-height: 1.3;
        }

        .message-from {
            font-size: 1.4rem;
            color: #ddd;
            margin-bottom: 25px;
            font-style: italic;
        }

        .video-container {
            width: 100%;
            background: #000;
            border-radius: 40px;
            overflow: hidden;
            margin: 20px 0 25px;
            border: 4px solid #ffd700;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.4);
            position: relative;
            aspect-ratio: 16 / 9;  /* Pastikan proporsi 16:9 */
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;  /* Biar full tanpa distort */
        }

        .timer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 60px;
            margin: 15px 0 10px;
            color: #ffd700;
            font-size: 1.3rem;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .timer-left, .timer-right {
            font-weight: bold;
        }

        .footer {
            margin-top: 30px;
            color: #888;
            font-size: 1rem;
            border-top: 2px solid rgba(255, 215, 0, 0.3);
            padding-top: 25px;
        }

        .footer span {
            color: #ffd700;
            font-weight: bold;
        }

        /* Responsive untuk HP kecil */
        @media (max-width: 600px) {
            .card { padding: 25px 15px; }
            h2 { font-size: 2rem; }
            .message-from { font-size: 1.2rem; }
            .timer-info { font-size: 1rem; padding: 12px 15px; }
        }

        /* Responsive untuk tablet */
        @media (min-width: 1024px) {
            .card { padding: 50px 40px; }
            h2 { font-size: 3.2rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎁 Pesan Dari Pak Amba</h2>
        <div class="message-from">dengarkan dulu baru dapat THR</div>
        
        <!-- Video container dengan aspect ratio fix -->
        <div class="video-container">
            <!-- 🔴 GANTI DENGAN NAMA FILE VIDEO LO -->
            <video id="myVideo" controls playsinline>
                <source src="video_lo.mp4" type="video/mp4">
                Browser tidak support video.
            </video>
        </div>

        <!-- Timer display -->
        <div class="timer-info">
            <span class="timer-left" id="currentTime">0:00</span>
            <span>⏳</span>
            <span class="timer-right" id="totalTime">0:15</span>
        </div>

        <div class="footer">
            © <span>VoidTeam</span> • 1446 H
        </div>
    </div>

    <script>
        // ========== KONFIGURASI ==========
        // 🔴 GANTI LINK YOUTUBE TUJUAN DI SINI
        const TARGET_URL = 'https://youtube.com/shorts/VzVwyhz57ig?si=uT8atCObWEl6qayz'; // Ganti dengan URL tujuan

        const video = document.getElementById('myVideo');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        
        let videoPlayed = false;
        let duration = 15; // default 15 detik

        // ========== FORMAT TIME ==========
        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // ========== UPDATE TIMER ==========
        video.addEventListener('loadedmetadata', function() {
            duration = video.duration || 15;
            totalTimeEl.textContent = formatTime(duration);
        });

        video.addEventListener('timeupdate', function() {
            currentTimeEl.textContent = formatTime(video.currentTime);
        });

        // ========== REDIRECT FUNCTION ==========
        function triggerRedirect() {
            // Efek getar dikit
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    window.scrollBy(10 * (i % 2 === 0 ? 1 : -1), 10 * (i % 2 === 0 ? 1 : -1));
                }, i * 60);
            }

            // Redirect
            setTimeout(() => {
                window.location.href = TARGET_URL;
            }, 300);
        }

        // ========== VIDEO EVENTS ==========
        video.addEventListener('play', function() {
            videoPlayed = true;
        });

        video.addEventListener('ended', function() {
            triggerRedirect();
        });

        video.addEventListener('pause', function() {
            if (videoPlayed && video.currentTime < video.duration - 1) {
                triggerRedirect();
            }
        });

        // ========== LOCK BACK BUTTON ==========
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };

        // Set initial time
        currentTimeEl.textContent = '0:00';
        totalTimeEl.textContent = '0:15';
    </script>
</body>
</html>
