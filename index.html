<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>✨ Selamat Idul Fitri 1446 H</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(145deg, #0a4d2e 0%, #1e7b4a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 60px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.4), 0 0 0 3px #ffd700 inset;
            animation: fadeScale 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Ornamen ketupat */
        .ketupat-ornament {
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 215, 0, 0.08);
            transform: rotate(45deg);
            border-radius: 40px;
            top: -80px;
            right: -80px;
            z-index: 0;
        }

        .ketupat-ornament2 {
            bottom: -80px;
            left: -80px;
            top: auto;
            right: auto;
        }

        .content {
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #0a4d2e;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 0 2px 5px rgba(255, 215, 0, 0.3);
        }

        .arabic {
            font-size: 2.2rem;
            color: #b8860b;
            margin-bottom: 25px;
            font-family: 'Times New Roman', 'Traditional Arabic', serif;
            line-height: 1.6;
            background: rgba(255, 215, 0, 0.1);
            padding: 20px 15px;
            border-radius: 100px;
            display: inline-block;
        }

        .arabic span {
            display: block;
            font-size: 1.8rem;
            color: #8b6508;
        }

        .decor {
            font-size: 3.5rem;
            margin: 15px 0;
            animation: gentleFloat 4s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .message {
            background: rgba(10, 77, 46, 0.05);
            border-radius: 40px;
            padding: 30px;
            margin: 30px 0;
            font-size: 1.3rem;
            line-height: 2;
            color: #1e3a2f;
            border-left: 5px solid #ffd700;
            border-right: 5px solid #ffd700;
        }

        .message p {
            margin: 10px 0;
        }

        .message .emote {
            font-size: 2rem;
            margin-top: 15px;
        }

        .btn-thr {
            background: linear-gradient(145deg, #ffd700, #ff8c00);
            color: #0a4d2e;
            border: none;
            padding: 25px 50px;
            font-size: 2.2rem;
            font-weight: 800;
            border-radius: 100px;
            cursor: pointer;
            transition: 0.3s;
            margin: 30px 0 20px;
            box-shadow: 0 20px 30px rgba(255, 140, 0, 0.5);
            animation: pulseGlow 1.8s infinite;
            width: 100%;
            max-width: 450px;
            letter-spacing: 2px;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); box-shadow: 0 20px 30px rgba(255, 140, 0, 0.5); }
            50% { transform: scale(1.03); box-shadow: 0 30px 40px rgba(255, 140, 0, 0.8); }
        }

        .btn-thr:hover {
            transform: scale(1.05);
            background: linear-gradient(145deg, #ff8c00, #ffd700);
        }

        .btn-thr:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 30px;
            color: #777;
            font-size: 1rem;
            border-top: 2px dashed #ffd700;
            padding-top: 20px;
        }

        .footer span {
            color: #b8860b;
            font-weight: bold;
        }

        /* Audio disembunyikan */
        audio {
            display: none;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .card { padding: 30px 20px; }
            h1 { font-size: 2.2rem; }
            .arabic { font-size: 1.8rem; }
            .btn-thr { font-size: 1.8rem; padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="ketupat-ornament"></div>
        <div class="ketupat-ornament ketupat-ornament2"></div>
        
        <div class="content">
            <div class="decor">🌙✨🌙</div>
            
            <h1>✨ Selamat Idul Fitri 1446 H ✨</h1>
            
            <div class="arabic">
                تَقَبَّلَ اللّهُ مِنَّا وَمِنكُمْ
                <span>Taqabbalallahu minna wa minkum</span>
            </div>
            
            <div class="message">
                <p>🌺 Di hari yang suci ini,</p>
                <p>mari kita saling memaafkan.</p>
                <p>🤲 Mohon maaf lahir dan batin</p>
                <p>atas segala khilaf dan salah.</p>
                <div class="emote">😭❤️</div>
            </div>

            <!-- TOMBOL PALSU THR -->
            <button class="btn-thr" id="thrBtn">
                ✨ KLIK DAPAT THR ✨
            </button>

            <div class="footer">
                © <span>VoidTeam</span> • 1446 H / 2026 M
            </div>
        </div>
    </div>

    <!-- Audio auto play (lagu Ramadhan) -->
    <audio id="ramadhanSong" loop preload="auto">
        <!-- 🔴 GANTI DENGAN FILE LAGU LO -->
        <source src="lagu_ramadhan.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <script>
        // ========== AUTO PLAY LAGU ==========
        const audio = document.getElementById('ramadhanSong');
        
        function playAudio() {
            audio.play()
                .then(() => console.log('Musik diputar'))
                .catch(err => {
                    console.log('Auto play dicegah browser, coba lagi');
                    // Fallback: coba play pas user sentuh layar
                    document.body.addEventListener('touchstart', function once() {
                        audio.play();
                        document.body.removeEventListener('touchstart', once);
                    }, { once: true });
                });
        }
        
        // Coba auto play
        playAudio();

        // ========== PINDAH KE HALAMAN2 ==========
        document.getElementById('thrBtn').addEventListener('click', function() {
            // Fade out musik
            audio.volume = 0;
            window.location.href = 'halaman2.html';
        });

        // ========== LOCK BACK BUTTON ==========
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    </script>
</body>
</html>
