<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Selamat Idul Fitri 1446 H</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(to bottom, #065f46, #034d36);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: #f1f5f9;
        padding: 20px;
    }

    .card {
        background: #ffffffdd;
        border-radius: 25px;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
        padding: 30px 30px 40px 30px;
        text-align: center;
        position: relative;
    }

    .icon-moon-stars {
        font-size: 60px;
        color: #fbbf24; /* Yellowish */
        margin-bottom: 10px;
        animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 6px #fbbf24, 0 0 14px #fbbf24; }
        to { text-shadow: 0 0 20px #fbbf24, 0 0 40px #fbbf24; }
    }

    h1 {
        color: #065f46;
        font-size: 24px;
        margin: 10px 0 15px 0;
        font-weight: 800;
        text-shadow: 0 2px 3px rgba(0,0,0,0.1);
    }

    .arabic-text {
        font-size: 22px;
        font-weight: 600;
        color: #b45309;
        margin: 10px 0 5px;
        direction: rtl;
        font-family: 'Scheherazade New', serif;
    }

    .transliteration {
        font-style: italic;
        color: #92400e;
        font-weight: 600;
        margin-bottom: 25px;
        background: #fef3c7;
        padding: 15px 20px;
        border-radius: 15px;
        box-shadow: inset 0 0 10px #d97706;
    }

    .message-box {
        background: #bbf7d0;
        color: #166534;
        border-radius: 20px;
        padding: 25px 20px;
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 30px;
        box-shadow: 0 8px 15px rgba(22, 101, 52,0.3);
    }

    .message-box span.emoji {
        font-size: 20px;
        margin: 0 4px;
        vertical-align: middle;
    }

    .cta-button {
        display: inline-block;
        background: linear-gradient(45deg, #fb923c, #f97316);
        color: #064e3b;
        font-weight: 700;
        font-size: 18px;
        padding: 15px 40px;
        border: none;
        border-radius: 40px;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(251,147,60,0.6);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        text-decoration: none;
        user-select: none;
    }

    .cta-button:hover, .cta-button:focus {
        transform: scale(1.05);
        box-shadow: 0 12px 30px rgba(251,147,60,0.9);
        outline: none;
    }

    footer {
        font-size: 14px;
        color: #4b5563;
        text-align: center;
        margin-top: 20px;
    }

    footer .team {
        color: #14b8a6;
        font-weight: 700;
    }
</style>
</head>
<body>

<div class="card">
    <div class="icon-moon-stars" aria-hidden="true">🌙✨🌙</div>

    <h1>Selamat Idul Fitri 1446 H ✨</h1>

    <div class="arabic-text" lang="ar" aria-label="Doa Taqabbalallahu minna wa minkum">
        تَقَبَّلَ اللّٰهُ مِنّا وَمِنْكُمْ
    </div>
    <div class="transliteration" aria-label="Taqabbalallahu minna wa minkum">
        Taqabbalallahu minna wa minkum
    </div>

    <div class="message-box">
        <span class="emoji" role="img" aria-label="Bunga">🌺</span> Di hari yang suci ini,<br />
        mari kita saling memaafkan.<br /><br />
        <span class="emoji" role="img" aria-label="Berdoa">🙏</span> Mohon maaf lahir dan batin<br />
        atas segala khilaf dan salah.<br /><br />
        <span class="emoji" role="img" aria-label="Tersedu dan hati">😭❤️</span>
    </div>

    <a href="halaman2.html" class="cta-button" role="button" aria-label="Klik untuk dapat THR dan lanjut ke halaman kedua">
        ✨ KLIK DAPAT THR ✨
    </a>

    <footer>
        © <span class="team">VoidTeam</span> · 1446 H / 2026 M
    </footer>
</div>

<audio id="background-music" src="lagu_ramadhan.mp3" autoplay loop controls style="margin-top: 20px; width: 100%; max-width: 400px; display:block; margin-left:auto; margin-right:auto;">
    Your browser does not support the audio element.
</audio>

</body>
</html>
