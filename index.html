<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Idul Fitri 1446 H</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0b4d2e, #1a8f4a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            border: 3px solid #ffd700;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-size: 3rem;
            color: #0b4d2e;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(255, 215, 0, 0.3);
        }

        .arabic {
            font-size: 2.5rem;
            color: #d4af37;
            margin-bottom: 30px;
            font-family: 'Times New Roman', serif;
        }

        .ketupat {
            font-size: 4rem;
            margin: 20px 0;
            animation: spin 10s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .message {
            font-size: 1.3rem;
            color: #333;
            line-height: 1.8;
            margin: 30px 0;
            padding: 20px;
            background: rgba(11, 77, 46, 0.05);
            border-radius: 20px;
            border-left: 5px solid #ffd700;
        }

        .btn-thr {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #0b4d2e;
            border: none;
            padding: 25px 60px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 80px;
            cursor: pointer;
            transition: 0.3s;
            margin: 30px 0;
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .btn-thr:hover {
            transform: scale(1.1);
            background: linear-gradient(135deg, #ff8c00, #ffd700);
        }

        .btn-thr:active {
            animation: click 0.2s;
        }

        @keyframes click {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.95); }
        }

        .footer {
            margin-top: 40px;
            color: #666;
            font-size: 1rem;
            border-top: 1px dashed #ffd700;
            padding-top: 20px;
        }

        .footer span {
            color: #ffd700;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="ketupat">🔸🔹🔸</div>
        
        <h1>✨ Selamat Idul Fitri 1446 H ✨</h1>
        <div class="arabic">تَقَبَّلَ اللّهُ مِنَّا وَمِنكُمْ</div>
        
        <div class="message">
            <p>🌙 Di hari yang suci ini,</p>
            <p>mari kita saling memaafkan.</p>
            <p>🤲 Mohon maaf lahir dan batin</p>
            <p>atas segala khilaf dan salah.</p>
        </div>

        <!-- TOMBOL PALSU "THR" - BAKAL PINDAH HALAMAN -->
        <button class="btn-thr" id="thrBtn">
            ✨ KLIK DAPAT THR ✨
        </button>

        <div class="footer">
            © <span>VoidTeam</span> • 2026
        </div>
    </div>

    <script>
        // PAS DIKLIK, PINDAH KE HALAMAN 2
        document.getElementById('thrBtn').addEventListener('click', function() {
            window.location.href = 'halaman2.html';
        });

        // JEBakan: gabisa balik pake back button
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    </script>
</body>
</html>
