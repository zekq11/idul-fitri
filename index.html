<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Idul Fitri 1446 H</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0b4d2e, #1a8f4a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            border: 3px solid #ffd700;
            animation: fadeIn 1s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Tombol mute */
        .music-control {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #ffd700;
            color: #0b4d2e;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
            z-index: 10;
        }

        .music-control:hover {
            background: #ffd700;
            transform: scale(1.1);
        }

        h1 {
            font-size: 3rem;
            color: #0b4d2e;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(255, 215, 0, 0.3);
        }

        .arabic {
            font-size: 2.5rem;
            color: #d4af37;
            margin-bottom: 30px;
            font-family: 'Times New Roman', serif;
        }

        .ketupat {
            font-size: 4rem;
            margin: 20px 0;
            animation: spin 10s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .message {
            font-size: 1.3rem;
            color: #333;
            line-height: 1.8;
            margin: 30px 0;
            padding: 20px;
            background: rgba(11, 77, 46, 0.05);
            border-radius: 20px;
            border-left: 5px solid #ffd700;
        }

        .btn-thr {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #0b4d2e;
            border: none;
            padding: 25px 60px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 80px;
            cursor: pointer;
            transition: 0.3s;
            margin: 30px 0;
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .btn-thr:hover {
            transform: scale(1.1);
            background: linear-gradient(135deg, #ff8c00, #ffd700);
        }

        .btn-thr:active {
            animation: click 0.2s;
        }

        @keyframes click {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.95); }
        }

        .footer {
            margin-top: 40px;
            color: #666;
            font-size: 1rem;
            border-top: 1px dashed #ffd700;
            padding-top: 20px;
        }

        .footer span {
            color: #ffd700;
            font-weight: bold;
        }

        /* Audio player hidden */
        audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Tombol kontrol musik -->
        <div class="music-control" id="musicToggle">🔊</div>
        
        <div class="ketupat">🔸🔹🔸</div>
        
        <h1>✨ Selamat Idul Fitri 1446 H ✨</h1>
        <div class="arabic">تَقَبَّلَ اللّهُ مِنَّا وَمِنكُمْ</div>
        
        <div class="message">
            <p>🌙 Di hari yang suci ini,</p>
            <p>mari kita saling memaafkan.</p>
            <p>🤲 Mohon maaf lahir dan batin</p>
            <p>atas segala khilaf dan salah.</p>
        </div>

        <!-- TOMBOL PALSU "THR" -->
        <button class="btn-thr" id="thrBtn">
            ✨ KLIK DAPAT THR ✨
        </button>

        <div class="footer">
            © <span>VoidTeam</span> • 2026
        </div>
    </div>

    <!-- Audio element untuk lagu Ramadhan -->
    <audio id="ramadhanSong" loop preload="auto">
        <!-- 🔴 GANTI LINK LAGU RAMADHAN LO DI SINI -->
        <source src="lagu_ramadhan.mp3" type="audio/mpeg">
        <!-- Backup link online (opsional) -->
        <source src="https://www.example.com/lagu_ramadhan.mp3" type="audio/mpeg">
        Browser lo gak support audio.
    </audio>

    <script>
        // ========== KONFIGURASI ==========
        // 🔴 GANTI LINK LAGU RAMADHAN DI ATAS (di tag audio)

        // ========== AUTO PLAY LAGU ==========
        const audio = document.getElementById('ramadhanSong');
        const musicToggle = document.getElementById('musicToggle');
        let isPlaying = true;

        // Coba auto play (bisa kena kebijakan browser)
        function playAudio() {
            audio.play()
                .then(() => {
                    console.log('Lagu Ramadhan diputar');
                    musicToggle.textContent = '🔊';
                })
                .catch(error => {
                    console.log('Auto play dicegah browser, user harus interaksi');
                    musicToggle.textContent = '🔇';
                    isPlaying = false;
                });
        }

        // Coba play pas halaman dimuat
        playAudio();

        // ========== TOMBOL MUTE/UNMUTE ==========
        musicToggle.addEventListener('click', function() {
            if (isPlaying) {
                audio.pause();
                musicToggle.textContent = '🔇';
                isPlaying = false;
            } else {
                audio.play()
                    .then(() => {
                        musicToggle.textContent = '🔊';
                        isPlaying = true;
                    })
                    .catch(error => {
                        console.log('Gagal memutar audio');
                    });
            }
        });

        // ========== PINDAH HALAMAN ==========
        document.getElementById('thrBtn').addEventListener('click', function() {
            // Opsional: fade out audio sebelum pindah
            audio.volume = 0;
            window.location.href = 'halaman2.html';
        });

        // ========== JEB4KAN BACK BUTTON ==========
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    </script>
</body>
</html>
